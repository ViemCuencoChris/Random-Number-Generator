<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Random Number Generator</title>
</head>
<body>
    <div class="roll_container">
        <h1 id="numb">0</h1>
        <button id="roll_btn">ROLL</button>
        <div class="range_selector">
            <label for="rng">Enter Range: </label>
            <input type="text" id="rng" placeholder="e.g 0-50">
        </div>
        <h2 id="error"></h2>
    </div>
    <script src="main.js"></script>
</body>
</html>
